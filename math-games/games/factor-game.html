<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>因数猎手 — 数学趣味游戏</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .target-num { font-size:56px; font-weight:900; text-align:center; color:var(--primary-dark); line-height:1; margin:8px 0; }
    .factor-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin:8px 0; }
    .factor-btn {
      padding:12px 4px; border-radius:10px; border:2px solid #e5e7eb;
      background:#fff; font-size:16px; font-weight:700; cursor:pointer; color:var(--text);
      transition:all .15s;
    }
    .factor-btn.selected { background:var(--primary); color:#fff; border-color:var(--primary); }
    .factor-btn.correct  { background:var(--success); color:#fff; border-color:var(--success); }
    .factor-btn.wrong    { background:var(--danger);  color:#fff; border-color:var(--danger); }
    .factor-btn.missed   { background:var(--warning); color:#fff; border-color:var(--warning); }
    .factor-btn:disabled { opacity:.6; cursor:not-allowed; }
    .progress-bar-wrap { background:#e5e7eb; border-radius:99px; height:8px; margin:4px 0; }
    .progress-bar { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--primary),var(--accent)); transition:width .3s; }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="toast" id="toast"></div>
  <div class="game-header">
    <a class="btn-back" href="../index.html">← 返回</a>
    <span class="game-header-title">🌿 因数猎手</span>
    <span class="score-badge" id="score-badge">0 分</span>
  </div>
  <div class="main-content">
    <div class="game-area">

      <div class="game-intro-card" id="intro-card">
        <h2>🌿 因数猎手</h2>
        <p>找出目标数字的<strong>所有因数</strong>！<br><br>
          选对一个因数 <strong>+2分</strong>，<br>
          选错一个 <strong>-1分</strong>，<br>
          全部找完后揭晓漏选的因数。<br><br>
          共10轮，看看你能得多少分！</p>
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button class="btn btn-outline" style="flex:1;" onclick="openHistory()">📋 历史记录</button>
          <button class="btn btn-primary" style="flex:1;" onclick="startGame()">开始猎因数</button>
        </div>
      </div>

      <div class="game-play-card hidden" id="play-card">
        <div class="stats-row" style="margin-bottom:8px;">
          <div class="stat-box"><div class="stat-val" id="round-val">1</div><div class="stat-label">轮次/10</div></div>
          <div class="stat-box"><div class="stat-val" id="score-val">0</div><div class="stat-label">得分</div></div>
          <div class="stat-box"><div class="stat-val" id="found-val">0</div><div class="stat-label">已找到</div></div>
        </div>
        <div style="font-size:13px;color:var(--muted);text-align:center;">找出以下数字的所有因数：</div>
        <div class="target-num" id="target-num">48</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
        <div class="factor-grid" id="factor-grid"></div>
        <button class="btn btn-primary mt8" onclick="submitRound()">✓ 我找完了</button>
      </div>

      <div class="game-result-card hidden" id="result-card">
        <div class="result-title">🎉 10轮结束！</div>
        <div class="result-score" id="result-score">0</div>
        <div style="font-size:14px;color:var(--muted);margin-bottom:4px;">分</div>
        <div class="result-record hidden" id="result-record">🏆 新纪录！</div>
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button class="btn btn-outline" style="flex:1;" onclick="startGame()">再来</button>
          <button class="btn btn-primary" style="flex:1;" onclick="window.location.href='../index.html'">返回大厅</button>
        </div>
        <div class="mt16" id="history-list"></div>
      </div>

    </div>
  </div>

  <div class="modal-mask" id="history-modal" onclick="closeHistory(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header"><span class="modal-title">📋 历史记录</span><button class="modal-close" onclick="closeHistory()">✕</button></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
</div>
<script src="../js/storage.js"></script>
<script>
  const GAME_ID = 'factor-game';
  const TOTAL_ROUNDS = 10;
  let round=0, totalScore=0, target=0, factors=[], selected=new Set();

  const TARGETS = [12,18,24,36,48,60,72,30,42,56,64,90,100,45,84];

  function getFactors(n){
    const f=[];
    for(let i=1;i<=n;i++) if(n%i===0) f.push(i);
    return f;
  }

  function startGame(){
    round=0;totalScore=0;
    document.getElementById('intro-card').classList.add('hidden');
    document.getElementById('result-card').classList.add('hidden');
    loadRound();
  }

  function loadRound(){
    round++;
    selected=new Set();
    // Pick a random target from pool, shuffled
    const pool=[...TARGETS].sort(()=>Math.random()-.5);
    target=pool[(round-1)%pool.length];
    factors=getFactors(target);
    document.getElementById('round-val').textContent=`${round}`;
    document.getElementById('score-val').textContent=totalScore;
    document.getElementById('found-val').textContent='0';
    document.getElementById('target-num').textContent=target;
    document.getElementById('score-badge').textContent=totalScore+' 分';
    document.getElementById('play-card').classList.remove('hidden');
    document.getElementById('progress-bar').style.width='0%';
    renderGrid();
  }

  function renderGrid(){
    // Show candidates from 1 to target, step relevant
    const max=Math.min(target,50);
    const candidates=[];
    for(let i=1;i<=max;i++) candidates.push(i);
    // Add some decoys beyond max if target>50
    if(target>50) candidates.push(target);
    const grid=document.getElementById('factor-grid');
    grid.innerHTML=candidates.map(n=>{
      let cls='factor-btn';
      if(selected.has(n)){cls+=' selected';}
      return `<button class="${cls}" onclick="toggleFactor(${n})">${n}</button>`;
    }).join('');
  }

  function toggleFactor(n){
    if(selected.has(n)) selected.delete(n);
    else selected.add(n);
    document.getElementById('found-val').textContent=selected.size;
    document.getElementById('progress-bar').style.width=(selected.size/factors.length*100)+'%';
    renderGrid();
  }

  function submitRound(){
    let roundScore=0;
    const grid=document.getElementById('factor-grid');
    const btns=grid.querySelectorAll('.factor-btn');
    btns.forEach(btn=>{
      const n=parseInt(btn.textContent);
      const isFactor=factors.includes(n);
      const isSelected=selected.has(n);
      if(isSelected&&isFactor){btn.className='factor-btn correct';btn.disabled=true;roundScore+=2;}
      else if(isSelected&&!isFactor){btn.className='factor-btn wrong';btn.disabled=true;roundScore-=1;}
      else if(!isSelected&&isFactor){btn.className='factor-btn missed';btn.disabled=true;}
    });
    totalScore=Math.max(0,totalScore+roundScore);
    document.getElementById('score-val').textContent=totalScore;
    document.getElementById('score-badge').textContent=totalScore+' 分';
    showToast(roundScore>=0 ? `+${roundScore} 分！漏了${factors.filter(f=>!selected.has(f)).length}个因数` : `本轮 ${roundScore} 分`);
    setTimeout(()=>{
      if(round>=TOTAL_ROUNDS) endGame();
      else loadRound();
    },1800);
  }

  function endGame(){
    document.getElementById('play-card').classList.add('hidden');
    document.getElementById('result-card').classList.remove('hidden');
    document.getElementById('result-score').textContent=totalScore;
    const isRecord=Storage.saveRecord(GAME_ID,{value:totalScore,label:`${totalScore}分`},'higher');
    if(isRecord)document.getElementById('result-record').classList.remove('hidden');
    const history=Storage.getHistory(GAME_ID);
    if(history.length)document.getElementById('history-list').innerHTML='<div style="font-size:13px;font-weight:700;margin-bottom:6px;color:var(--muted);">历史记录</div>'+history.slice(0,5).map(h=>`<div style="background:var(--bg);border-radius:10px;padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;font-size:13px;"><span>${h.label}</span><span style="color:var(--muted)">${h.date}</span></div>`).join('');
  }

  function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
  const MEDALS=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
  function openHistory(){const h=Storage.getHistory(GAME_ID);const b=Storage.getRecord(GAME_ID);const body=document.getElementById('modal-body');if(!h.length){body.innerHTML='<div class="modal-empty">还没有记录！🎮</div>';}else{const bh=b?`<div style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:14px;padding:14px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:14px;font-weight:700;">🏆 最佳纪录</span><span style="font-size:20px;font-weight:800;">${b.label}</span></div>`:'';body.innerHTML=bh+h.map((x,i)=>`<div class="history-row"><span class="h-rank">${MEDALS[i]||i+1}</span><span class="h-val">${x.label}</span><span class="h-date">${x.date}</span></div>`).join('');}document.getElementById('history-modal').classList.add('open');}
  function closeHistory(e){if(e&&e.target!==document.getElementById('history-modal'))return;document.getElementById('history-modal').classList.remove('open');}
</script>
</body>
</html>
