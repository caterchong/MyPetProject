<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>心算闯关 — 数学趣味游戏</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .op-label {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .feedback-flash {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      height: 36px;
      line-height: 36px;
      transition: opacity 0.2s;
    }
    .feedback-flash.correct { color: var(--success); }
    .feedback-flash.wrong   { color: var(--danger);  }
    .level-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="toast" id="toast"></div>

  <div class="game-header">
    <a class="btn-back" href="../index.html">← 返回</a>
    <span class="game-header-title">⚡ 心算闯关</span>
    <span class="score-badge" id="score-badge">0 题</span>
  </div>

  <div class="main-content">
    <div class="game-area">

      <!-- 介绍 -->
      <div class="game-intro-card" id="intro-card">
        <h2>⚡ 心算闯关</h2>
        <p>
          <strong>60秒</strong>内尽可能多地答对数学题。<br>
          难度随正确数量自动提升，错误不扣时间，但要注意正确率！
        </p>
        <div style="margin:14px 0;">
          <div><span class="level-badge" style="background:#dcfce7;color:#16a34a;">简单</span> 加减法</div>
          <div style="margin-top:6px;"><span class="level-badge" style="background:#fef3c7;color:#d97706;">中等</span> 加减乘</div>
          <div style="margin-top:6px;"><span class="level-badge" style="background:#fee2e2;color:#dc2626;">困难</span> 加减乘除</div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn btn-outline" style="flex:1;" onclick="openHistory()">📋 历史记录</button>
          <button class="btn btn-primary" style="flex:1;" onclick="startGame()">开始挑战</button>
        </div>
      </div>

      <!-- 游戏区 -->
      <div class="game-play-card hidden" id="play-card">
        <div class="stats-row" style="margin-bottom:10px;">
          <div class="stat-box">
            <div class="stat-val" id="time-left" style="color:var(--danger);">60</div>
            <div class="stat-label">剩余秒数</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="correct-count">0</div>
            <div class="stat-label">答对</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="wrong-count" style="color:var(--danger);">0</div>
            <div class="stat-label">答错</div>
          </div>
        </div>

        <div class="timer-bar-wrap">
          <div class="timer-bar" id="timer-bar" style="width:100%;"></div>
        </div>

        <div style="text-align:center;margin:10px 0 4px;">
          <span class="op-label" id="level-label" style="background:var(--success);">简单</span>
        </div>

        <div class="equation-display" id="equation">?</div>
        <div class="feedback-flash" id="feedback-flash">&nbsp;</div>

        <div class="input-group">
          <input class="game-input" id="answer-input" type="number" inputmode="numeric"
                 placeholder="输入答案" autocomplete="off" onkeydown="handleKey(event)">
          <button class="btn btn-primary" style="width:auto;padding:0 20px;" onclick="submitAnswer()">确定</button>
        </div>
      </div>

      <!-- 结果 -->
      <div class="game-result-card hidden" id="result-card">
        <div class="result-title">🎉 时间到！</div>
        <div class="result-score" id="result-score">0</div>
        <div style="font-size:14px;color:var(--muted);margin-bottom:4px;">题</div>
        <div class="result-record hidden" id="result-record">🏆 新纪录！</div>
        <div class="stats-row" style="margin-bottom:16px;">
          <div class="stat-box">
            <div class="stat-val" id="res-correct" style="color:var(--success);">0</div>
            <div class="stat-label">答对</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="res-wrong" style="color:var(--danger);">0</div>
            <div class="stat-label">答错</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="res-accuracy">-</div>
            <div class="stat-label">正确率</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline" style="flex:1;" onclick="startGame()">再来一局</button>
          <button class="btn btn-primary" style="flex:1;" onclick="window.location.href='../index.html'">返回大厅</button>
        </div>
        <div class="history-list mt16" id="history-list"></div>
      </div>

    </div>
  </div>

  <!-- 历史记录 Modal -->
  <div class="modal-mask" id="history-modal" onclick="closeHistory(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <span class="modal-title">📋 历史记录</span>
        <button class="modal-close" onclick="closeHistory()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

</div>

<script src="../js/storage.js"></script>
<script>
  const GAME_ID = 'mental-math';
  const TOTAL_TIME = 60;

  let correctCount = 0, wrongCount = 0;
  let timeLeft = TOTAL_TIME;
  let timerInterval = null;
  let currentAnswer = 0;

  const LEVELS = [
    { name: '简单', color: '#16a34a', bg: '#dcfce7', threshold: 0,  ops: ['+', '-'],       range: [1, 20]  },
    { name: '中等', color: '#d97706', bg: '#fef3c7', threshold: 8,  ops: ['+', '-', '×'],  range: [1, 15]  },
    { name: '困难', color: '#dc2626', bg: '#fee2e2', threshold: 18, ops: ['+', '-', '×', '÷'], range: [1, 12] },
  ];

  function currentLevel() {
    for (let i = LEVELS.length - 1; i >= 0; i--) {
      if (correctCount >= LEVELS[i].threshold) return LEVELS[i];
    }
    return LEVELS[0];
  }

  function generateQuestion() {
    const lv = currentLevel();
    const op = lv.ops[Math.floor(Math.random() * lv.ops.length)];
    const [min, max] = lv.range;
    let a = Math.floor(Math.random() * (max - min + 1)) + min;
    let b = Math.floor(Math.random() * (max - min + 1)) + min;

    let display, ans;
    if (op === '+') { display = `${a} + ${b}`; ans = a + b; }
    else if (op === '-') {
      if (a < b) [a, b] = [b, a];
      display = `${a} − ${b}`; ans = a - b;
    } else if (op === '×') {
      a = Math.floor(Math.random() * 9) + 2;
      b = Math.floor(Math.random() * 9) + 2;
      display = `${a} × ${b}`; ans = a * b;
    } else { // ÷
      b = Math.floor(Math.random() * 9) + 2;
      ans = Math.floor(Math.random() * 9) + 2;
      a = b * ans;
      display = `${a} ÷ ${b}`;
    }

    currentAnswer = ans;
    document.getElementById('equation').textContent = display + ' = ?';

    const lbl = document.getElementById('level-label');
    lbl.textContent = lv.name;
    lbl.style.background = lv.bg;
    lbl.style.color = lv.color;
  }

  function startGame() {
    correctCount = 0; wrongCount = 0; timeLeft = TOTAL_TIME;
    clearInterval(timerInterval);

    document.getElementById('correct-count').textContent = '0';
    document.getElementById('wrong-count').textContent = '0';
    document.getElementById('time-left').textContent = TOTAL_TIME;
    document.getElementById('timer-bar').style.width = '100%';
    document.getElementById('feedback-flash').innerHTML = '&nbsp;';
    document.getElementById('score-badge').textContent = '0 题';

    document.getElementById('intro-card').classList.add('hidden');
    document.getElementById('result-card').classList.add('hidden');
    document.getElementById('play-card').classList.remove('hidden');

    generateQuestion();
    document.getElementById('answer-input').value = '';
    document.getElementById('answer-input').focus();

    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById('time-left').textContent = timeLeft;
      document.getElementById('timer-bar').style.width = (timeLeft / TOTAL_TIME * 100) + '%';
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        endGame();
      }
    }, 1000);
  }

  function handleKey(e) {
    if (e.key === 'Enter') submitAnswer();
  }

  function submitAnswer() {
    const input = document.getElementById('answer-input');
    const val = parseInt(input.value, 10);
    if (isNaN(val)) return;

    const flash = document.getElementById('feedback-flash');
    if (val === currentAnswer) {
      correctCount++;
      document.getElementById('correct-count').textContent = correctCount;
      document.getElementById('score-badge').textContent = correctCount + ' 题';
      flash.textContent = '✓ 正确！';
      flash.className = 'feedback-flash correct';
    } else {
      wrongCount++;
      document.getElementById('wrong-count').textContent = wrongCount;
      flash.textContent = `✗ 答案是 ${currentAnswer}`;
      flash.className = 'feedback-flash wrong';
    }

    setTimeout(() => { flash.innerHTML = '&nbsp;'; flash.className = 'feedback-flash'; }, 700);
    input.value = '';
    generateQuestion();
    input.focus();
  }

  function endGame() {
    document.getElementById('play-card').classList.add('hidden');
    document.getElementById('result-card').classList.remove('hidden');

    const total = correctCount + wrongCount;
    const accuracy = total ? Math.round(correctCount / total * 100) + '%' : '-';

    document.getElementById('result-score').textContent = correctCount;
    document.getElementById('res-correct').textContent = correctCount;
    document.getElementById('res-wrong').textContent = wrongCount;
    document.getElementById('res-accuracy').textContent = accuracy;

    const isRecord = Storage.saveRecord(GAME_ID, { value: correctCount, label: `${correctCount}题` }, 'higher');
    const recEl = document.getElementById('result-record');
    if (isRecord) recEl.classList.remove('hidden'); else recEl.classList.add('hidden');

    const history = Storage.getHistory(GAME_ID);
    const listEl = document.getElementById('history-list');
    if (history.length) {
      listEl.innerHTML = '<div style="font-size:13px;font-weight:700;margin-bottom:6px;color:var(--muted);">历史记录</div>' +
        history.slice(0,5).map(h => `
          <div style="background:var(--bg);border-radius:10px;padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;font-size:13px;">
            <span>${h.label}</span>
            <span style="color:var(--muted)">${h.date}</span>
          </div>`).join('');
    }
  }

  // ===== History Modal =====
  const MEDALS = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
  function openHistory() {
    const history = Storage.getHistory(GAME_ID);
    const best = Storage.getRecord(GAME_ID);
    const body = document.getElementById('modal-body');
    if (!history.length) {
      body.innerHTML = '<div class="modal-empty">还没有记录，快去挑战吧！🎮</div>';
    } else {
      const bestHtml = best
        ? `<div style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:14px;padding:14px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:14px;font-weight:700;">🏆 最佳纪录</span>
            <span style="font-size:20px;font-weight:800;">${best.label}</span>
           </div>` : '';
      const rows = history.map((h, i) => `
        <div class="history-row">
          <span class="h-rank">${MEDALS[i] || (i+1+'.')}</span>
          <span class="h-val">${h.label}</span>
          <span class="h-date">${h.date}</span>
        </div>`).join('');
      body.innerHTML = bestHtml + rows;
    }
    document.getElementById('history-modal').classList.add('open');
  }
  function closeHistory(e) {
    if (e && e.target !== document.getElementById('history-modal')) return;
    document.getElementById('history-modal').classList.remove('open');
  }
</script>
</body>
</html>
