<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>概率直觉 — 数学趣味游戏</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .coin-display { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin:8px 0; min-height:50px; }
    .coin-icon { font-size:28px; transition:transform .2s; }
    .coin-icon.flip { transform:rotateY(180deg); }
    .prob-question { background:var(--bg); border-radius:14px; padding:14px; margin:8px 0; text-align:center; }
    .prob-q-text { font-size:15px; font-weight:700; color:var(--text); margin-bottom:10px; line-height:1.5; }
    .prob-choices { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .prob-choice { padding:12px 8px; border-radius:10px; border:2px solid #e5e7eb; background:#fff; font-size:14px; font-weight:700; cursor:pointer; color:var(--text); transition:all .15s; }
    .prob-choice:hover { border-color:var(--primary); }
    .prob-choice.correct { border-color:var(--success); background:#f0fdf4; color:#166534; }
    .prob-choice.wrong { border-color:var(--danger); background:#fef2f2; color:#991b1b; }
    .streak-bar { display:flex; gap:4px; justify-content:center; margin:6px 0; flex-wrap:wrap; }
    .streak-dot { width:16px; height:16px; border-radius:50%; background:#e5e7eb; }
    .streak-dot.correct { background:var(--success); }
    .streak-dot.wrong { background:var(--danger); }
    .explanation { font-size:12px; color:var(--muted); background:var(--bg); border-radius:10px; padding:10px; margin-top:8px; line-height:1.6; }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="toast" id="toast"></div>
  <div class="game-header">
    <a class="btn-back" href="../index.html">← 返回</a>
    <span class="game-header-title">🪙 概率直觉</span>
    <span class="score-badge" id="score-badge">0 分</span>
  </div>
  <div class="main-content">
    <div class="game-area">

      <div class="game-intro-card" id="intro-card">
        <h2>🪙 概率直觉</h2>
        <p>测测你对概率的直觉！<br><br>
          回答关于抛硬币、随机事件的问题，<br>
          看看你的直觉和数学是否一致。<br><br>
          人类大脑经常在概率上犯错，<br>
          你能克服直觉陷阱吗？<br><br>
          共 <strong>10题</strong>，每题100分！</p>
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button class="btn btn-outline" style="flex:1;" onclick="openHistory()">📋 历史记录</button>
          <button class="btn btn-primary" style="flex:1;" onclick="startGame()">开始测试</button>
        </div>
      </div>

      <div class="game-play-card hidden" id="play-card" style="padding:12px;">
        <div class="streak-bar" id="streak-bar"></div>
        <div class="stats-row" style="margin-bottom:6px;">
          <div class="stat-box"><div class="stat-val" id="round-val">1</div><div class="stat-label">题次/10</div></div>
          <div class="stat-box"><div class="stat-val" id="total-score">0</div><div class="stat-label">总分</div></div>
        </div>
        <div class="coin-display" id="coin-display"></div>
        <div class="prob-question">
          <div class="prob-q-text" id="q-text"></div>
          <div class="prob-choices" id="q-choices"></div>
          <div class="explanation hidden" id="q-explanation"></div>
        </div>
        <button class="btn btn-primary mt8 hidden" id="next-btn" onclick="nextRound()" style="width:100%;"></button>
      </div>

      <div class="game-result-card hidden" id="result-card">
        <div class="result-title">🪙 测试完成！</div>
        <div class="result-score" id="result-score">0</div>
        <div style="font-size:14px;color:var(--muted);margin-bottom:4px;">/ 1000分</div>
        <div class="result-record hidden" id="result-record">🏆 新纪录！</div>
        <div style="background:var(--bg);border-radius:12px;padding:14px;font-size:13px;line-height:1.8;margin-bottom:12px;" id="result-comment"></div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline" style="flex:1;" onclick="startGame()">再测一次</button>
          <button class="btn btn-primary" style="flex:1;" onclick="window.location.href='../index.html'">返回大厅</button>
        </div>
        <div class="mt16" id="history-list"></div>
      </div>

    </div>
  </div>

  <div class="modal-mask" id="history-modal" onclick="closeHistory(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header"><span class="modal-title">📋 历史记录</span><button class="modal-close" onclick="closeHistory()">✕</button></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
</div>
<script src="../js/storage.js"></script>
<script>
  const GAME_ID = 'probability-coins';
  const TOTAL = 10;

  // Question bank: each question has text, choices, correctIndex, explanation, coins (0=no animation, N=show N coins)
  const QUESTIONS = [
    {
      coins: 5,
      text: '连续抛5次硬币，全部正面的概率是？',
      choices: ['1/32', '1/10', '1/16', '1/64'],
      correct: 0,
      explain: '每次正面概率1/2，5次独立事件：(1/2)^5 = 1/32 ≈ 3.1%'
    },
    {
      coins: 0,
      text: '已知前4次都是正面，第5次正面的概率？',
      choices: ['1/2', '1/32', '更大', '更小'],
      correct: 0,
      explain: '硬币没有记忆！每次投掷独立，第5次正面概率始终是1/2。这是"赌徒谬误"。'
    },
    {
      coins: 3,
      text: '连续抛3次硬币，至少一次正面的概率？',
      choices: ['7/8', '3/4', '1/2', '3/8'],
      correct: 0,
      explain: '用补集法：1 - (全反面概率) = 1 - (1/2)^3 = 1 - 1/8 = 7/8 ≈ 87.5%'
    },
    {
      coins: 0,
      text: '抛100次硬币，出现50正50反的概率最接近？',
      choices: ['约8%', '约50%', '约1%', '约25%'],
      correct: 0,
      explain: '二项分布中央项：C(100,50)/2^100 ≈ 7.96%。最可能的结果，但绝对概率并不高！'
    },
    {
      coins: 0,
      text: '两个孩子的家庭，已知至少一个是男孩，两个都是男孩的概率？',
      choices: ['1/3', '1/2', '1/4', '2/3'],
      correct: 0,
      explain: '四种等可能情况：男男、男女、女男、女女。已知至少一男，排除女女，剩3种，男男占1/3。'
    },
    {
      coins: 0,
      text: '随机在[0,1]取两个数，它们的和超过1的概率？',
      choices: ['1/2', '1/4', '3/4', '1/3'],
      correct: 0,
      explain: '几何概率：单位正方形中，x+y>1的区域是右上三角形，面积=1/2。'
    },
    {
      coins: 6,
      text: '连续抛6次硬币，恰好3次正面的概率？',
      choices: ['5/16', '1/4', '1/2', '3/8'],
      correct: 0,
      explain: 'C(6,3)/2^6 = 20/64 = 5/16 ≈ 31.25%。这是最可能的单一结果。'
    },
    {
      coins: 0,
      text: '生日悖论：23人同一房间，两人生日相同的概率超过？',
      choices: ['50%', '10%', '25%', '75%'],
      correct: 0,
      explain: '令人惊讶！23人时概率约50.7%，超过50%！这是因为对比的是"任意两人"而非"和某特定人"。'
    },
    {
      coins: 0,
      text: '连续抛硬币，出现"正反"和"正正"哪个先出现的概率更高？',
      choices: ['一样大', '"正反"更高', '"正正"更高', '无法判断'],
      correct: 1,
      explain: '"正反"期望出现次数4次，"正正"期望6次。"正反"更容易先出现，因为一旦出现反面就"重置"了。'
    },
    {
      coins: 0,
      text: '蒙提霍尔：3门选1，主持人开一个羊门，换门获奖概率？',
      choices: ['2/3', '1/2', '1/3', '3/4'],
      correct: 0,
      explain: '换门胜率2/3！初选对概率1/3，主持人行动后换门把剩余2/3的概率集中到另一门。'
    }
  ];

  let round = 0, totalScore = 0, answered = false;
  let roundResults = []; // true/false per round

  function startGame() {
    round = 0; totalScore = 0; answered = false; roundResults = [];
    // Shuffle questions
    shuffled = [...QUESTIONS].sort(() => Math.random() - 0.5).slice(0, TOTAL);
    document.getElementById('intro-card').classList.add('hidden');
    document.getElementById('result-card').classList.add('hidden');
    document.getElementById('play-card').classList.remove('hidden');
    nextRound();
  }

  let shuffled = [];

  function nextRound() {
    if (round >= TOTAL) { endGame(); return; }
    answered = false;
    const q = shuffled[round];
    round++;

    document.getElementById('round-val').textContent = round;
    document.getElementById('total-score').textContent = totalScore;
    document.getElementById('score-badge').textContent = totalScore + ' 分';
    document.getElementById('next-btn').classList.add('hidden');
    document.getElementById('q-explanation').classList.add('hidden');
    document.getElementById('q-explanation').textContent = '';
    renderStreak();

    // Coins animation
    const coinDisplay = document.getElementById('coin-display');
    if (q.coins > 0) {
      coinDisplay.innerHTML = Array.from({length: q.coins}, () => `<span class="coin-icon">🪙</span>`).join('');
    } else {
      coinDisplay.innerHTML = '';
    }

    // Question text
    document.getElementById('q-text').textContent = q.text;

    // Shuffle choices but track correct one
    const indices = [0, 1, 2, 3];
    const shuffledIndices = indices.sort(() => Math.random() - 0.5);
    const correctChoice = q.choices[q.correct];
    const choicesHtml = shuffledIndices.map((origIdx, displayIdx) => {
      const text = q.choices[origIdx];
      const isCorrect = origIdx === q.correct;
      return `<button class="prob-choice" onclick="answer(this, ${isCorrect}, '${q.explain.replace(/'/g, "\\'")}', ${origIdx === q.correct})">${text}</button>`;
    }).join('');
    document.getElementById('q-choices').innerHTML = choicesHtml;
  }

  function answer(btn, isCorrect, explain, _) {
    if (answered) return;
    answered = true;

    // Mark correct/wrong
    const allBtns = document.querySelectorAll('.prob-choice');
    allBtns.forEach(b => b.disabled = true);
    btn.classList.add(isCorrect ? 'correct' : 'wrong');

    // Find and highlight correct answer
    if (!isCorrect) {
      // Highlight correct choice
      const q = shuffled[round - 1];
      const correctText = q.choices[q.correct];
      allBtns.forEach(b => {
        if (b.textContent === correctText) b.classList.add('correct');
      });
    }

    if (isCorrect) {
      totalScore += 100;
      roundResults.push(true);
      showToast('✅ 正确！+100分');
    } else {
      roundResults.push(false);
      showToast('❌ 答错了');
    }

    // Show explanation
    const expEl = document.getElementById('q-explanation');
    expEl.textContent = '💡 ' + explain;
    expEl.classList.remove('hidden');

    // Show next button
    const nextBtn = document.getElementById('next-btn');
    nextBtn.textContent = round >= TOTAL ? '查看结果 →' : '下一题 →';
    nextBtn.classList.remove('hidden');
    renderStreak();
  }

  function renderStreak() {
    document.getElementById('streak-bar').innerHTML = Array.from({length: TOTAL}, (_, i) => {
      let cls = '';
      if (i < roundResults.length) cls = roundResults[i] ? 'correct' : 'wrong';
      else if (i === roundResults.length) cls = 'current';
      return `<div class="streak-dot ${cls}"></div>`;
    }).join('');
  }

  function endGame() {
    document.getElementById('play-card').classList.add('hidden');
    document.getElementById('result-card').classList.remove('hidden');
    document.getElementById('result-score').textContent = totalScore;
    const correct = roundResults.filter(Boolean).length;
    let comment = '';
    if (correct >= 9) comment = '概率大师！你的直觉与数学高度一致，太厉害了！';
    else if (correct >= 7) comment = '非常不错！你对概率有很好的理解，继续加油！';
    else if (correct >= 5) comment = '还不错，超过了一半！概率有时违反直觉，多练练。';
    else comment = '概率确实很反直觉！别灰心，这些陷阱连数学家也会犯错。';
    document.getElementById('result-comment').innerHTML =
      `答对 <b>${correct}/10</b> 题<br>总分 <b>${totalScore}</b> 分<br><br><span style="color:var(--muted);">${comment}</span>`;
    const isRecord = Storage.saveRecord(GAME_ID, {value: totalScore, label: `${totalScore}分(${correct}/10)`}, 'higher');
    if (isRecord) document.getElementById('result-record').classList.remove('hidden');
    const history = Storage.getHistory(GAME_ID);
    if (history.length) document.getElementById('history-list').innerHTML = '<div style="font-size:13px;font-weight:700;margin-bottom:6px;color:var(--muted);">历史记录</div>' + history.slice(0, 5).map(h => `<div style="background:var(--bg);border-radius:10px;padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;font-size:13px;"><span>${h.label}</span><span style="color:var(--muted)">${h.date}</span></div>`).join('');
  }

  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
  const MEDALS = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
  function openHistory() { const h = Storage.getHistory(GAME_ID); const b = Storage.getRecord(GAME_ID); const body = document.getElementById('modal-body'); if (!h.length) { body.innerHTML = '<div class="modal-empty">还没有记录！🎮</div>'; } else { const bh = b ? `<div style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:14px;padding:14px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:14px;font-weight:700;">🏆 最佳纪录</span><span style="font-size:20px;font-weight:800;">${b.label}</span></div>` : ''; body.innerHTML = bh + h.map((x, i) => `<div class="history-row"><span class="h-rank">${MEDALS[i] || i + 1}</span><span class="h-val">${x.label}</span><span class="h-date">${x.date}</span></div>`).join(''); } document.getElementById('history-modal').classList.add('open'); }
  function closeHistory(e) { if (e && e.target !== document.getElementById('history-modal')) return; document.getElementById('history-modal').classList.remove('open'); }
</script>
</body>
</html>
