<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>蒙提霍尔 — 数学趣味游戏</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .doors-row { display:flex; gap:12px; justify-content:center; margin:12px 0; }
    .door {
      width:90px; height:120px; border-radius:14px; display:flex; flex-direction:column;
      align-items:center; justify-content:center; cursor:pointer; transition:all .3s;
      border:3px solid transparent; font-size:13px; font-weight:700; gap:6px;
    }
    .door.closed { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; font-size:36px; }
    .door.selected { border-color:#fbbf24; box-shadow:0 0 0 4px rgba(251,191,36,.3); }
    .door.open-goat { background:#f1f5f9; color:var(--muted); border-color:#e5e7eb; font-size:32px; cursor:not-allowed; }
    .door.open-car   { background:linear-gradient(135deg,#fbbf24,#f59e0b); color:#fff; font-size:36px; }
    .door.open-car-miss { background:#fef2f2; color:#dc2626; border-color:#dc2626; font-size:32px; }
    .phase-desc { font-size:14px; color:var(--muted); text-align:center; line-height:1.6; margin:8px 0; }
    .stats-boxes { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:8px 0; }
    .stat-box-lg { background:var(--bg); border-radius:12px; padding:12px; text-align:center; }
    .stat-box-lg .v { font-size:22px; font-weight:800; color:var(--primary); }
    .stat-box-lg .l { font-size:11px; color:var(--muted); }
    .win-rate-bar { height:10px; border-radius:99px; background:#e5e7eb; overflow:hidden; margin:4px 0; }
    .win-rate-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--primary),var(--accent)); transition:width .6s; }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="toast" id="toast"></div>
  <div class="game-header">
    <a class="btn-back" href="../index.html">← 返回</a>
    <span class="game-header-title">🚪 蒙提霍尔</span>
    <span class="score-badge" id="score-badge">0/0</span>
  </div>
  <div class="main-content">
    <div class="game-area">

      <div class="game-intro-card" id="intro-card">
        <h2>🚪 蒙提霍尔悖论</h2>
        <p>3扇门，1辆汽车🚗，2只山羊🐐。<br><br>
          你选一扇门，主持人（知道答案）<strong>打开</strong>另一扇山羊门，<br>
          然后问你：<strong>换还是不换？</strong><br><br>
          直觉说不换=50%；<br>
          数学说<strong>换门胜率=67%</strong>！<br><br>
          玩20局感受真实概率！</p>
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button class="btn btn-outline" style="flex:1;" onclick="openHistory()">📋 历史记录</button>
          <button class="btn btn-primary" style="flex:1;" onclick="startGame()">开始体验</button>
        </div>
      </div>

      <div class="game-play-card hidden" id="play-card">
        <div class="stats-boxes">
          <div class="stat-box-lg"><div class="v" id="stat-switch-win">0/0</div><div class="l">换门胜率</div><div class="win-rate-bar"><div class="win-rate-fill" id="switch-bar" style="width:0%"></div></div></div>
          <div class="stat-box-lg"><div class="v" id="stat-stay-win">0/0</div><div class="l">不换胜率</div><div class="win-rate-bar"><div class="win-rate-fill" id="stay-bar" style="width:0%"></div></div></div>
        </div>
        <div class="phase-desc" id="phase-desc">第 1/20 局：点击选择一扇门</div>
        <div class="doors-row" id="doors-row"></div>
        <div style="display:flex;gap:8px;margin-top:4px;" id="action-btns"></div>
      </div>

      <div class="game-result-card hidden" id="result-card">
        <div class="result-title">🎲 20局结束！</div>
        <div class="result-score" id="result-score">67</div>
        <div style="font-size:14px;color:var(--muted);margin-bottom:4px;">% 换门胜率</div>
        <div class="result-record hidden" id="result-record">🏆 新纪录！</div>
        <div style="background:var(--bg);border-radius:14px;padding:16px;margin-bottom:12px;font-size:13px;color:var(--text);line-height:1.8;" id="result-comment"></div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline" style="flex:1;" onclick="startGame()">再来20局</button>
          <button class="btn btn-primary" style="flex:1;" onclick="window.location.href='../index.html'">返回大厅</button>
        </div>
        <div class="mt16" id="history-list"></div>
      </div>

    </div>
  </div>

  <div class="modal-mask" id="history-modal" onclick="closeHistory(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header"><span class="modal-title">📋 历史记录</span><button class="modal-close" onclick="closeHistory()">✕</button></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
</div>
<script src="../js/storage.js"></script>
<script>
  const GAME_ID = 'monty-hall';
  const TOTAL = 20;
  let round=0, carPos=0, chosen=-1, openDoor=-1;
  let switchWins=0, switchTotal=0, stayWins=0, stayTotal=0;
  let phase='choose'; // choose | switch

  function startGame(){
    round=0;switchWins=0;switchTotal=0;stayWins=0;stayTotal=0;
    document.getElementById('intro-card').classList.add('hidden');
    document.getElementById('result-card').classList.add('hidden');
    document.getElementById('play-card').classList.remove('hidden');
    updateStats();nextRound();
  }

  function nextRound(){
    round++;phase='choose';chosen=-1;openDoor=-1;
    carPos=Math.floor(Math.random()*3);
    document.getElementById('phase-desc').textContent=`第 ${round}/${TOTAL} 局：点击选择一扇门`;
    document.getElementById('score-badge').textContent=`${round}/${TOTAL}`;
    document.getElementById('action-btns').innerHTML='';
    renderDoors();
  }

  function renderDoors(){
    const row=document.getElementById('doors-row');
    row.innerHTML=[0,1,2].map(i=>{
      if(phase==='choose'){
        const sel=chosen===i?' selected':'';
        return `<div class="door closed${sel}" onclick="chooseDoor(${i})">🚪<span>第${i+1}门</span></div>`;
      }else{
        if(i===openDoor) return `<div class="door open-goat">🐐<span>山羊</span></div>`;
        const sel=chosen===i?' selected':'';
        return `<div class="door closed${sel}" onclick="${i!==chosen?`switchTo(${i})`:''}">🚪<span>第${i+1}门</span></div>`;
      }
    }).join('');
  }

  function chooseDoor(i){
    if(phase!=='choose')return;
    chosen=i;
    // Host opens a goat door (not chosen, not car)
    const options=[0,1,2].filter(d=>d!==chosen&&d!==carPos);
    openDoor=options[Math.floor(Math.random()*options.length)];
    phase='switch';
    document.getElementById('phase-desc').textContent='主持人开了一扇山羊门！你要换门吗？';
    document.getElementById('action-btns').innerHTML=`
      <button class="btn btn-outline" style="flex:1;" onclick="decide(false)">🔒 不换</button>
      <button class="btn btn-primary" style="flex:1;" onclick="decide(true)">🔄 换门</button>`;
    renderDoors();
  }

  function switchTo(i){
    if(phase!=='switch'||i===chosen)return;
    chosen=i;renderDoors();
  }

  function decide(doSwitch){
    const won=chosen===carPos;
    if(doSwitch){switchWins+=won?1:0;switchTotal++;}
    else{stayWins+=won?1:0;stayTotal++;}
    // Reveal all doors
    const row=document.getElementById('doors-row');
    row.innerHTML=[0,1,2].map(i=>{
      if(i===openDoor)return`<div class="door open-goat">🐐<span>山羊</span></div>`;
      if(i===carPos&&i===chosen)return`<div class="door open-car">🚗<span>你赢了！</span></div>`;
      if(i===carPos)return`<div class="door open-car" style="opacity:.7">🚗<span>这里</span></div>`;
      return`<div class="door open-car-miss">🐐<span>山羊</span></div>`;
    }).join('');
    document.getElementById('phase-desc').textContent=won?'🎉 恭喜！你赢得了汽车！':'😅 这次是山羊…';
    document.getElementById('action-btns').innerHTML=`<button class="btn btn-primary" onclick="${round>=TOTAL?'endGame()':'nextRound()'}" style="width:100%;">${round>=TOTAL?'查看结果':'下一局 →'}</button>`;
    updateStats();
  }

  function updateStats(){
    const sr=switchTotal?Math.round(switchWins/switchTotal*100):0;
    const str=stayTotal?Math.round(stayWins/stayTotal*100):0;
    document.getElementById('stat-switch-win').textContent=`${switchWins}/${switchTotal} (${sr}%)`;
    document.getElementById('stat-stay-win').textContent=`${stayWins}/${stayTotal} (${str}%)`;
    document.getElementById('switch-bar').style.width=sr+'%';
    document.getElementById('stay-bar').style.width=str+'%';
  }

  function endGame(){
    document.getElementById('play-card').classList.add('hidden');
    document.getElementById('result-card').classList.remove('hidden');
    const sr=switchTotal?Math.round(switchWins/switchTotal*100):0;
    document.getElementById('result-score').textContent=sr;
    document.getElementById('result-comment').innerHTML=`
      📊 你的实验结果：<br>
      换门：${switchWins}/${switchTotal} = <b>${sr}%</b> 胜率<br>
      不换：${stayWins}/${stayTotal} = <b>${stayTotal?Math.round(stayWins/stayTotal*100):0}%</b> 胜率<br><br>
      📐 数学理论：换门胜率 <b>2/3 ≈ 67%</b><br>
      因为初始选对的概率只有1/3，<br>而主持人的行为让换门集中了剩余的2/3概率！`;
    const isRecord=Storage.saveRecord(GAME_ID,{value:sr,label:`换门胜率${sr}%`},'higher');
    if(isRecord)document.getElementById('result-record').classList.remove('hidden');
    const history=Storage.getHistory(GAME_ID);
    if(history.length)document.getElementById('history-list').innerHTML='<div style="font-size:13px;font-weight:700;margin-bottom:6px;color:var(--muted);">历史记录</div>'+history.slice(0,5).map(h=>`<div style="background:var(--bg);border-radius:10px;padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;font-size:13px;"><span>${h.label}</span><span style="color:var(--muted)">${h.date}</span></div>`).join('');
  }

  const MEDALS=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
  function openHistory(){const h=Storage.getHistory(GAME_ID);const b=Storage.getRecord(GAME_ID);const body=document.getElementById('modal-body');if(!h.length){body.innerHTML='<div class="modal-empty">还没有记录！🎮</div>';}else{const bh=b?`<div style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:14px;padding:14px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:14px;font-weight:700;">🏆 最佳纪录</span><span style="font-size:20px;font-weight:800;">${b.label}</span></div>`:'';body.innerHTML=bh+h.map((x,i)=>`<div class="history-row"><span class="h-rank">${MEDALS[i]||i+1}</span><span class="h-val">${x.label}</span><span class="h-date">${x.date}</span></div>`).join('');}document.getElementById('history-modal').classList.add('open');}
  function closeHistory(e){if(e&&e.target!==document.getElementById('history-modal'))return;document.getElementById('history-modal').classList.remove('open');}
</script>
</body>
</html>
